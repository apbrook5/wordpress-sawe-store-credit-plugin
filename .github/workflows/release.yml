name: Build WordPress Plugin Release

# ============================================================================
# TRIGGER
# ============================================================================
# Runs automatically whenever a tag matching v* is pushed to the repo.
# Examples: v1.0.0, v1.0.1, v2.0.0
#
# To create a release:
#   git tag v1.0.1
#   git push origin v1.0.1
#
# GitHub will then:
#   1. Run this workflow.
#   2. Build a correctly named sawe-membership-store-credits.zip
#   3. Create a GitHub Release for the tag.
#   4. Attach the zip as a downloadable asset on that release.
# ============================================================================

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:

      # ── 1. Check out the repository ────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Extract the version number from the tag ─────────────────────────
      # Strips the leading 'v' so v1.0.1 becomes 1.0.1.
      # Stored as ${{ env.VERSION }} for use in later steps.
      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      # ── 3. Build the plugin zip ────────────────────────────────────────────
      # Creates a folder named sawe-membership-store-credits (the exact name
      # WordPress needs) containing only the plugin files — no .git history,
      # no GitHub Actions folder, no dev-only files.
      #
      # The resulting zip structure is:
      #   sawe-membership-store-credits/
      #     sawe-membership-store-credits.php
      #     uninstall.php
      #     README.md
      #     admin/
      #     includes/
      #     public/
      #     docs/
      #
      # WordPress unzips this and installs it as the plugin folder
      # sawe-membership-store-credits — which matches the plugin's
      # own directory references (SAWE_MSC_PLUGIN_DIR etc.).
      - name: Build plugin zip
        run: |
          # Create a clean staging directory with the correct plugin folder name
          mkdir -p build/sawe-membership-store-credits

          # Copy all plugin files — explicitly list what to include so that
          # dev/repo files (.git, .github, etc.) are never bundled.
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='*.zip' \
            --exclude='.DS_Store' \
            --exclude='node_modules' \
            ./ build/sawe-membership-store-credits/

          # Create the zip from inside the build directory so the top-level
          # folder inside the zip is sawe-membership-store-credits/ (not build/).
          # The zip has no version suffix so WordPress replaces the existing
          # plugin folder instead of creating a new one on upload.
          cd build
          zip -r ../sawe-membership-store-credits-${{ env.VERSION }}.zip \
            sawe-membership-store-credits/

          cd ..
          echo "Built: sawe-membership-store-credits-${{ env.VERSION }}.zip"
          unzip -l sawe-membership-store-credits-${{ env.VERSION }}.zip | head -40

      # ── 4. Create the GitHub Release and attach the zip ────────────────────
      # Uses the official GitHub CLI (gh) which is pre-installed on all
      # GitHub-hosted runners. Automatically generates release notes from
      # commit messages since the last tag.
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            sawe-membership-store-credits-${{ env.VERSION }}.zip
